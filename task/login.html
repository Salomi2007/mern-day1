<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen
             bg-pink-200    /* default for small screens */
             sm:bg-yellow-200   /* small screens and up */
             md:bg-green-200   /* medium screens and up */
             lg:bg-purple-200  /* large screens and up */
             transition-colors">

  <!-- Login Box -->
  <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-80">
    <h2 class="text-2xl font-bold mb-6 text-center dark:text-white">User Login</h2>

    <form action="home.html" class="flex flex-col">
      <input type="text" placeholder="Username" class="mb-4 p-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white dark:border-gray-600" required>
      <input type="password" placeholder="Password" class="mb-6 p-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white dark:border-gray-600" required>
      <button type="submit" class="bg-purple-700 text-white py-3 rounded hover:bg-purple-600 transition-colors">Sign In</button>
    </form>
  </div>

</body>
</html>
